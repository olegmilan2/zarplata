<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Зарплата по кассе</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #fffdf7;
      --ink: #1f2a1d;
      --muted: #5a6757;
      --accent: #db6d2e;
      --accent-2: #2f7f66;
      --line: #d9d4c8;
      --shadow: 0 12px 30px rgba(40, 38, 29, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at -10% -10%, #f4d8b7 0%, transparent 60%),
        radial-gradient(700px 450px at 110% 0%, #cae9db 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
      padding: 20px;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      animation: show 0.45s ease;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font: inherit;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      padding: 10px 14px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    .btn-main { background: var(--accent); color: #fff; }
    .btn-sub { background: var(--accent-2); color: #fff; }
    .btn-ghost { background: #ebe7dc; color: var(--ink); }

    .result {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .pill .k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    .pill .v {
      font-size: 20px;
      font-weight: 800;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 4px;
      text-align: left;
    }

    tfoot td {
      font-weight: 700;
      border-top: 2px solid var(--line);
      border-bottom: 0;
    }

    .small { color: var(--muted); font-size: 13px; }
    .row-delete {
      border: 1px solid #e2b7a1;
      background: #fff1ea;
      color: #8b2f0b;
      padding: 6px 10px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .row-metric {
      width: 120px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      background: #fff;
    }
    .row-metric-save {
      border: 1px solid #b7d8cb;
      background: #eaf7f1;
      color: #1f5f49;
      padding: 6px 10px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-left: 6px;
    }
    .date-toggle {
      background: transparent;
      border: 0;
      padding: 0;
      border-radius: 0;
      color: #1f5f49;
      font: inherit;
      font-weight: 700;
      text-decoration: underline;
      cursor: pointer;
    }
    .note-row td {
      background: #faf7ef;
      padding: 10px 8px;
    }
    .note-box {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .metric-label {
      font-size: 12px;
      color: var(--muted);
      margin-right: 4px;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .result { grid-template-columns: 1fr; }
      th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { display: none; }
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Касса, процент, ставка</h1>
      <p class="sub">Формула: касса × процент + ставка. Сезон: май-сентябрь.</p>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <label for="date">Дата</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label for="cash">Касса (₴)</label>
          <input id="cash" type="number" min="0" step="0.01" placeholder="5000" />
        </div>
        <div>
          <label for="percent">Процент (%)</label>
          <input id="percent" type="number" min="0" step="0.01" value="30" />
        </div>
        <div>
          <label for="rate">Ставка за день (₴)</label>
          <input id="rate" type="number" min="0" step="0.01" placeholder="3000" />
        </div>
        <div>
          <label for="coworker">Сменщик</label>
          <input id="coworker" type="text" placeholder="Имя сменщика" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-main" id="calcBtn">Посчитать</button>
        <button class="btn-sub" id="saveBtn">Сохранить / Обновить день</button>
        <button class="btn-ghost" id="deleteBtn">Удалить день</button>
        <button class="btn-ghost" id="clearBtn">Очистить сезон</button>
      </div>

      <div class="result">
        <div class="pill"><div class="k">Доход по %</div><div class="v" id="percentAmount">0 ₴</div></div>
        <div class="pill"><div class="k">Ставка</div><div class="v" id="rateAmount">0 ₴</div></div>
        <div class="pill"><div class="k">Итог за день</div><div class="v" id="dayTotal">0 ₴</div></div>
      </div>
    </section>

    <section class="card">
      <div class="small" id="seasonInfo"></div>
      <table>
        <thead>
          <tr>
            <th>Дата</th>
            <th>Касса</th>
            <th>% доход</th>
            <th>Ставка</th>
            <th>Итог</th>
            <th>Сменщик</th>
            <th>Действие</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
        <tfoot>
          <tr>
            <td>Итого</td>
            <td id="sumCash">0 ₴</td>
            <td id="sumPercent">0 ₴</td>
            <td id="sumRate">0 ₴</td>
            <td id="sumTotal">0 ₴</td>
          </tr>
        </tfoot>
      </table>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'zarplata_web_v1';

    const $ = (id) => document.getElementById(id);
    const fmt = (n) => new Intl.NumberFormat('uk-UA', { style: 'currency', currency: 'UAH', maximumFractionDigits: 2 }).format(n || 0);

    const dateEl = $('date');
    const cashEl = $('cash');
    const percentEl = $('percent');
    const rateEl = $('rate');
    const coworkerEl = $('coworker');
    const percentAmountEl = $('percentAmount');
    const rateAmountEl = $('rateAmount');
    const dayTotalEl = $('dayTotal');
    const rowsEl = $('rows');
    const seasonInfoEl = $('seasonInfo');

    function getTodayDate() {
      return new Date().toISOString().slice(0, 10);
    }

    let autoDateEnabled = true;
    let expandedDate = null;

    function syncCurrentDate() {
      if (!autoDateEnabled) return;
      dateEl.value = getTodayDate();
    }

    syncCurrentDate();
    coworkerEl.value = load().entries[dateEl.value]?.coworker || '';

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { entries: {} };
      } catch {
        return { entries: {} };
      }
    }

    function save(db) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function getMetrics(entry) {
      return {
        litht: Number(entry?.metrics?.litht) || 0,
        premium: Number(entry?.metrics?.premium) || 0,
        hard: Number(entry?.metrics?.hard) || 0
      };
    }

    function escHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function calc() {
      const cash = num(cashEl.value);
      const percent = num(percentEl.value);
      const rate = num(rateEl.value);
      const percentAmount = cash * percent / 100;
      const total = percentAmount + rate;

      percentAmountEl.textContent = fmt(percentAmount);
      rateAmountEl.textContent = fmt(rate);
      dayTotalEl.textContent = fmt(total);

      return { cash, percent, rate, percentAmount, total };
    }

    function saveDay() {
      const date = dateEl.value;
      if (!date) return alert('Укажи дату');

      const { cash, percent, rate, percentAmount, total } = calc();
      const db = load();
      const coworker = coworkerEl.value.trim();

      db.entries[date] = {
        cash,
        percent,
        dayRate: rate,
        percentAmount,
        total,
        coworker: coworker || db.entries[date]?.coworker || '',
        metrics: getMetrics(db.entries[date]),
        updatedAt: new Date().toISOString()
      };

      save(db);
      render();
      alert('Сохранено');
    }

    function deleteDay() {
      const date = dateEl.value;
      if (!date) return alert('Укажи дату');

      const db = load();
      if (!db.entries[date]) {
        return alert('За эту дату записи нет.');
      }

      if (!confirm(`Удалить запись за ${date}?`)) return;
      delete db.entries[date];
      save(db);
      render();
      alert('Запись удалена');
    }

    function clearSeason() {
      if (!confirm('Удалить все записи сезона из браузера?')) return;
      save({ entries: {} });
      render();
    }

    function render() {
      const db = load();
      seasonInfoEl.textContent = 'Показаны все сохраненные даты.';
      const dates = Object.keys(db.entries).sort();
      if (expandedDate && !dates.includes(expandedDate)) {
        expandedDate = null;
      }

      let sumCash = 0;
      let sumPercent = 0;
      let sumRate = 0;
      let sumTotal = 0;

      rowsEl.innerHTML = '';

      for (const d of dates) {
        const e = db.entries[d];
        sumCash += e.cash;
        sumPercent += e.percentAmount;
        sumRate += e.dayRate;
        sumTotal += e.total;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><button class="date-toggle" data-toggle-date="${d}">${d}</button></td>
          <td>${fmt(e.cash)}</td>
          <td>${fmt(e.percentAmount)} (${e.percent}%)</td>
          <td>${fmt(e.dayRate)}</td>
          <td>${fmt(e.total)}</td>
          <td>${e.coworker ? escHtml(e.coworker) : '—'}</td>
          <td><button class="row-delete" data-date="${d}">Удалить</button></td>
        `;
        rowsEl.appendChild(tr);

        if (expandedDate === d) {
          const metrics = getMetrics(e);
          const noteTr = document.createElement('tr');
          noteTr.className = 'note-row';
          noteTr.innerHTML = `
            <td colspan="7">
              <div class="note-box">
                <span class="metric-label">litht</span>
                <input class="row-metric" data-metric-date="${d}" data-metric-key="litht" type="number" step="0.01" min="0" value="${metrics.litht}" />
                <span class="metric-label">premium</span>
                <input class="row-metric" data-metric-date="${d}" data-metric-key="premium" type="number" step="0.01" min="0" value="${metrics.premium}" />
                <span class="metric-label">hard</span>
                <input class="row-metric" data-metric-date="${d}" data-metric-key="hard" type="number" step="0.01" min="0" value="${metrics.hard}" />
                <button class="row-metric-save" data-metric-save-date="${d}">Сохранить</button>
              </div>
            </td>
          `;
          rowsEl.appendChild(noteTr);
        }
      }

      if (!dates.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" class="small">Пока нет сохраненных записей.</td>';
        rowsEl.appendChild(tr);
      }

      $('sumCash').textContent = fmt(sumCash);
      $('sumPercent').textContent = fmt(sumPercent);
      $('sumRate').textContent = fmt(sumRate);
      $('sumTotal').textContent = fmt(sumTotal);
    }

    $('calcBtn').addEventListener('click', calc);
    $('saveBtn').addEventListener('click', saveDay);
    $('deleteBtn').addEventListener('click', deleteDay);
    $('clearBtn').addEventListener('click', clearSeason);
    rowsEl.addEventListener('click', (event) => {
      const toggleBtn = event.target.closest('[data-toggle-date]');
      if (toggleBtn) {
        const date = toggleBtn.dataset.toggleDate;
        expandedDate = expandedDate === date ? null : date;
        render();
        return;
      }

      const metricBtn = event.target.closest('[data-metric-save-date]');
      if (metricBtn) {
        const date = metricBtn.dataset.metricSaveDate;
        const inputs = rowsEl.querySelectorAll(`[data-metric-date="${date}"]`);
        if (!inputs.length) return;

        const db = load();
        if (!db.entries[date]) return;
        db.entries[date].metrics = db.entries[date].metrics || {};
        for (const input of inputs) {
          const key = input.dataset.metricKey;
          db.entries[date].metrics[key] = num(input.value);
        }
        db.entries[date].updatedAt = new Date().toISOString();
        save(db);
        render();
        return;
      }

      const btn = event.target.closest('.row-delete');
      if (!btn) return;

      const date = btn.dataset.date;
      const db = load();
      if (!db.entries[date]) return;
      if (!confirm(`Удалить запись за ${date}?`)) return;

      delete db.entries[date];
      save(db);
      render();
    });
    dateEl.addEventListener('change', () => {
      autoDateEnabled = false;
      const db = load();
      coworkerEl.value = db.entries[dateEl.value]?.coworker || '';
      render();
    });

    calc();
    render();
    setInterval(() => {
      syncCurrentDate();
      render();
    }, 60000);
  </script>
</body>
</html>
