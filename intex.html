<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f4ef" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <title>Зарплата по кассе</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #fffdf7;
      --ink: #1f2a1d;
      --muted: #5a6757;
      --accent: #db6d2e;
      --accent-2: #2f7f66;
      --line: #d9d4c8;
      --shadow: 0 12px 30px rgba(40, 38, 29, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at -10% -10%, #f4d8b7 0%, transparent 60%),
        radial-gradient(700px 450px at 110% 0%, #cae9db 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
      padding: 20px;
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      animation: show 0.45s ease;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
      overflow: hidden;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .grid > div {
      min-width: 0;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      padding: 12px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font: inherit;
      font-size: 16px;
      line-height: 1.25;
      background: #fff;
    }
    input[type="date"] {
      text-align: left;
      direction: ltr;
      display: block;
      min-height: 46px;
    }
    input[type="date"]::-webkit-date-and-time-value {
      min-height: 1.2em;
      text-align: left;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      padding: 12px 14px;
      border-radius: 999px;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    .btn-main { background: var(--accent); color: #fff; }
    .btn-sub { background: var(--accent-2); color: #fff; }
    .btn-ghost { background: #ebe7dc; color: var(--ink); }

    .result {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .pill .k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    .pill .v {
      font-size: 20px;
      font-weight: 800;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 4px;
      text-align: left;
    }

    tfoot td {
      font-weight: 700;
      border-top: 2px solid var(--line);
      border-bottom: 0;
    }

    .small { color: var(--muted); font-size: 13px; }
    .row-delete {
      border: 1px solid #e2b7a1;
      background: #fff1ea;
      color: #8b2f0b;
      padding: 6px 10px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .row-metric {
      width: 120px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      background: #fff;
    }
    .row-metric-save {
      border: 1px solid #b7d8cb;
      background: #eaf7f1;
      color: #1f5f49;
      padding: 6px 10px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-left: 6px;
    }
    .date-toggle {
      background: transparent;
      border: 0;
      padding: 0;
      border-radius: 0;
      color: #1f5f49;
      font: inherit;
      font-weight: 700;
      text-decoration: underline;
      cursor: pointer;
    }
    .note-row td {
      background: #faf7ef;
      padding: 10px 8px;
    }
    .note-box {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .metric-label {
      font-size: 12px;
      color: var(--muted);
      margin-right: 4px;
    }
    .mobile-list {
      display: none;
      gap: 10px;
    }
    .mobile-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
    }
    .mobile-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mobile-date {
      background: transparent;
      border: 0;
      padding: 0;
      font: inherit;
      font-weight: 800;
      font-size: 16px;
      color: #1f5f49;
      text-decoration: underline;
      cursor: pointer;
    }
    .mobile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .mobile-k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }
    .mobile-v {
      font-weight: 700;
    }
    .mobile-note {
      border-top: 1px solid var(--line);
      margin-top: 8px;
      padding-top: 8px;
    }
    .mobile-empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
      background: #fff;
    }
    .month-divider-row td {
      background: #efe8d7;
      color: #2f3a2e;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      border-top: 2px solid #c8bea8;
      border-bottom: 2px solid #c8bea8;
      padding: 10px 8px;
    }
    .month-divider-text {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      background: #e6dcc5;
    }
    .month-divider-mobile {
      border: 1px solid var(--line);
      background: #f3efe4;
      color: #4a5548;
      font-weight: 700;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .mobile-totals {
      display: block;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      margin-top: 10px;
    }
    .mobile-totals-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .summary-block {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      margin-top: 10px;
    }
    .summary-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .summary-list {
      display: grid;
      gap: 6px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 6px 0;
      font-size: 14px;
    }
    .summary-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .summary-key {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .result { grid-template-columns: 1fr; }
      .actions button { flex: 1 1 calc(50% - 8px); }
    }
    @media (max-width: 700px) {
      .desktop-table { display: none; }
      .mobile-list { display: grid; }
      .card { padding: 14px; }
      .wrap { gap: 12px; }
      h1 { font-size: clamp(22px, 8vw, 32px); }
      .actions { gap: 8px; }
      .actions button { flex: 1 1 100%; }
      .summary-row {
        flex-direction: column;
        gap: 2px;
      }
    }

    @keyframes show {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Отчет</h1>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <label for="date">Дата</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label for="cash">Касса (₴)</label>
          <input id="cash" type="number" inputmode="decimal" min="0" step="0.01" placeholder="5000" />
        </div>
        <div>
          <label for="percent">Процент (%)</label>
          <input id="percent" type="number" inputmode="decimal" min="0" step="0.01" value="30" />
        </div>
        <div>
          <label for="rate">Ставка за день (₴)</label>
          <input id="rate" type="number" inputmode="decimal" min="0" step="0.01" placeholder="3000" />
        </div>
        <div>
          <label for="coworker">Сменщик</label>
          <input id="coworker" type="text" placeholder="Имя сменщика" />
        </div>
      </div>

      <div class="actions">
        <button class="btn-main" id="calcBtn">Посчитать</button>
        <button class="btn-sub" id="saveBtn">Сохранить / Обновить день</button>
        <button class="btn-ghost" id="deleteBtn">Удалить день</button>
        <button class="btn-ghost" id="clearBtn">Очистить сезон</button>
      </div>

      <div class="result">
        <div class="pill"><div class="k">Доход по %</div><div class="v" id="percentAmount">0 ₴</div></div>
        <div class="pill"><div class="k">Ставка</div><div class="v" id="rateAmount">0 ₴</div></div>
        <div class="pill"><div class="k">Итог за день</div><div class="v" id="dayTotal">0 ₴</div></div>
      </div>
    </section>

    <section class="card">
      <div class="small" id="seasonInfo"></div>
      <div class="desktop-table">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Касса</th>
              <th>% доход</th>
              <th>Ставка</th>
              <th>Итог</th>
              <th>Сменщик</th>
              <th>Действие</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
          <tfoot>
            <tr>
              <td>Итого</td>
              <td id="sumCash">0 ₴</td>
              <td id="sumPercent">0 ₴</td>
              <td id="sumRate">0 ₴</td>
              <td id="sumTotal">0 ₴</td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div class="mobile-list" id="mobileRows"></div>
      <div class="mobile-totals">
        <div class="mobile-totals-title">Итого за все дни</div>
        <div class="mobile-grid">
          <div><div class="mobile-k">Касса</div><div class="mobile-v" id="mobileSumCash">0 ₴</div></div>
          <div><div class="mobile-k">% доход</div><div class="mobile-v" id="mobileSumPercent">0 ₴</div></div>
          <div><div class="mobile-k">Ставка</div><div class="mobile-v" id="mobileSumRate">0 ₴</div></div>
          <div><div class="mobile-k">Итог</div><div class="mobile-v" id="mobileSumTotal">0 ₴</div></div>
        </div>
      </div>
      <div class="summary-block">
        <div class="summary-title">Итого по месяцам</div>
        <div class="summary-list" id="monthTotals"></div>
      </div>
      <div class="summary-block">
        <div class="summary-title">Дни сменщиков по месяцам</div>
        <div class="summary-list" id="coworkerStats"></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'zarplata_web_v1';

    const $ = (id) => document.getElementById(id);
    const fmt = (n) => new Intl.NumberFormat('uk-UA', { style: 'currency', currency: 'UAH', maximumFractionDigits: 2 }).format(n || 0);

    const dateEl = $('date');
    const cashEl = $('cash');
    const percentEl = $('percent');
    const rateEl = $('rate');
    const coworkerEl = $('coworker');
    const percentAmountEl = $('percentAmount');
    const rateAmountEl = $('rateAmount');
    const dayTotalEl = $('dayTotal');
    const rowsEl = $('rows');
    const mobileRowsEl = $('mobileRows');
    const seasonInfoEl = $('seasonInfo');
    const monthTotalsEl = $('monthTotals');
    const coworkerStatsEl = $('coworkerStats');

    function getTodayDate() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    let autoDateEnabled = true;
    let expandedDate = null;

    function syncCurrentDate() {
      if (!autoDateEnabled) return;
      dateEl.value = getTodayDate();
    }

    syncCurrentDate();
    coworkerEl.value = load().entries[dateEl.value]?.coworker || '';

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { entries: {} };
      } catch {
        return { entries: {} };
      }
    }

    function save(db) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function getMetrics(entry) {
      return {
        litht: Number(entry?.metrics?.litht) || 0,
        premium: Number(entry?.metrics?.premium) || 0,
        hard: Number(entry?.metrics?.hard) || 0
      };
    }

    function escHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function monthKey(dateStr) {
      return dateStr.slice(0, 7);
    }

    function monthLabel(dateStr) {
      const date = new Date(`${monthKey(dateStr)}-01T00:00:00`);
      const raw = new Intl.DateTimeFormat('ru-RU', { month: 'long', year: 'numeric' }).format(date);
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    }

    function calc() {
      const cash = num(cashEl.value);
      const percent = num(percentEl.value);
      const rate = num(rateEl.value);
      const percentAmount = cash * percent / 100;
      const total = percentAmount + rate;

      percentAmountEl.textContent = fmt(percentAmount);
      rateAmountEl.textContent = fmt(rate);
      dayTotalEl.textContent = fmt(total);

      return { cash, percent, rate, percentAmount, total };
    }

    function saveDay() {
      const date = dateEl.value;
      if (!date) return alert('Укажи дату');

      const { cash, percent, rate, percentAmount, total } = calc();
      const db = load();
      const coworker = coworkerEl.value.trim();

      db.entries[date] = {
        cash,
        percent,
        dayRate: rate,
        percentAmount,
        total,
        coworker: coworker || db.entries[date]?.coworker || '',
        metrics: getMetrics(db.entries[date]),
        updatedAt: new Date().toISOString()
      };

      save(db);
      render();
      alert('Сохранено');
    }

    function deleteDay() {
      const date = dateEl.value;
      if (!date) return alert('Укажи дату');

      const db = load();
      if (!db.entries[date]) {
        return alert('За эту дату записи нет.');
      }

      if (!confirm(`Удалить запись за ${date}?`)) return;
      delete db.entries[date];
      save(db);
      render();
      alert('Запись удалена');
    }

    function clearSeason() {
      if (!confirm('Удалить все записи сезона из браузера?')) return;
      save({ entries: {} });
      render();
    }

    function render() {
      const db = load();
      seasonInfoEl.textContent = 'Показаны все сохраненные даты.';
      const dates = Object.keys(db.entries).sort((a, b) => {
        const keyA = Number(a.replaceAll('-', ''));
        const keyB = Number(b.replaceAll('-', ''));
        if (Number.isFinite(keyA) && Number.isFinite(keyB) && keyA !== keyB) {
          return keyB - keyA;
        }

        const updatedA = Date.parse(db.entries[a]?.updatedAt || '');
        const updatedB = Date.parse(db.entries[b]?.updatedAt || '');
        return (Number.isFinite(updatedB) ? updatedB : 0) - (Number.isFinite(updatedA) ? updatedA : 0);
      });
      if (expandedDate && !dates.includes(expandedDate)) {
        expandedDate = null;
      }

      let sumCash = 0;
      let sumPercent = 0;
      let sumRate = 0;
      let sumTotal = 0;
      const monthTotals = {};
      const coworkerMonthStats = {};

      rowsEl.innerHTML = '';
      mobileRowsEl.innerHTML = '';

      let prevMonth = '';
      for (const d of dates) {
        const e = db.entries[d];
        const currentMonth = monthKey(d);
        if (currentMonth !== prevMonth) {
          const dividerTr = document.createElement('tr');
          dividerTr.className = 'month-divider-row';
          dividerTr.innerHTML = `<td colspan="7"><span class="month-divider-text">---- ${monthLabel(d)} ----</span></td>`;
          rowsEl.appendChild(dividerTr);

          const dividerMobile = document.createElement('div');
          dividerMobile.className = 'month-divider-mobile';
          dividerMobile.textContent = monthLabel(d);
          mobileRowsEl.appendChild(dividerMobile);
          prevMonth = currentMonth;
        }

        sumCash += e.cash;
        sumPercent += e.percentAmount;
        sumRate += e.dayRate;
        sumTotal += e.total;
        if (!monthTotals[currentMonth]) {
          monthTotals[currentMonth] = { cash: 0, percent: 0, rate: 0, total: 0 };
        }
        monthTotals[currentMonth].cash += e.cash;
        monthTotals[currentMonth].percent += e.percentAmount;
        monthTotals[currentMonth].rate += e.dayRate;
        monthTotals[currentMonth].total += e.total;

        const coworkerName = (e.coworker || '').trim() || 'Без сменщика';
        if (!coworkerMonthStats[currentMonth]) coworkerMonthStats[currentMonth] = {};
        coworkerMonthStats[currentMonth][coworkerName] = (coworkerMonthStats[currentMonth][coworkerName] || 0) + 1;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><button class="date-toggle" data-toggle-date="${d}">${d}</button></td>
          <td>${fmt(e.cash)}</td>
          <td>${fmt(e.percentAmount)} (${e.percent}%)</td>
          <td>${fmt(e.dayRate)}</td>
          <td>${fmt(e.total)}</td>
          <td>${e.coworker ? escHtml(e.coworker) : '—'}</td>
          <td><button class="row-delete" data-date="${d}">Удалить</button></td>
        `;
        rowsEl.appendChild(tr);

        if (expandedDate === d) {
          const metrics = getMetrics(e);
          const noteTr = document.createElement('tr');
          noteTr.className = 'note-row';
          noteTr.innerHTML = `
            <td colspan="7">
              <div class="note-box">
                <span class="metric-label">litht</span>
                <input class="row-metric" data-metric-date="${d}" data-metric-key="litht" type="number" step="0.01" min="0" value="${metrics.litht}" />
                <span class="metric-label">premium</span>
                <input class="row-metric" data-metric-date="${d}" data-metric-key="premium" type="number" step="0.01" min="0" value="${metrics.premium}" />
                <span class="metric-label">hard</span>
                <input class="row-metric" data-metric-date="${d}" data-metric-key="hard" type="number" step="0.01" min="0" value="${metrics.hard}" />
                <button class="row-metric-save" data-metric-save-date="${d}">Сохранить</button>
              </div>
            </td>
          `;
          rowsEl.appendChild(noteTr);
        }

        const mobileItem = document.createElement('article');
        mobileItem.className = 'mobile-item';
        mobileItem.innerHTML = `
          <div class="mobile-head">
            <button class="mobile-date" data-toggle-date="${d}">${d}</button>
            <button class="row-delete" data-date="${d}">Удалить</button>
          </div>
          <div class="mobile-grid">
            <div><div class="mobile-k">Касса</div><div class="mobile-v">${fmt(e.cash)}</div></div>
            <div><div class="mobile-k">% доход</div><div class="mobile-v">${fmt(e.percentAmount)} (${e.percent}%)</div></div>
            <div><div class="mobile-k">Ставка</div><div class="mobile-v">${fmt(e.dayRate)}</div></div>
            <div><div class="mobile-k">Итог</div><div class="mobile-v">${fmt(e.total)}</div></div>
          </div>
          <div><div class="mobile-k">Сменщик</div><div class="mobile-v">${e.coworker ? escHtml(e.coworker) : '—'}</div></div>
        `;

        if (expandedDate === d) {
          const metrics = getMetrics(e);
          const noteBox = document.createElement('div');
          noteBox.className = 'mobile-note';
          noteBox.innerHTML = `
            <div class="note-box">
              <span class="metric-label">litht</span>
              <input class="row-metric" data-metric-date="${d}" data-metric-key="litht" type="number" inputmode="decimal" step="0.01" min="0" value="${metrics.litht}" />
              <span class="metric-label">premium</span>
              <input class="row-metric" data-metric-date="${d}" data-metric-key="premium" type="number" inputmode="decimal" step="0.01" min="0" value="${metrics.premium}" />
              <span class="metric-label">hard</span>
              <input class="row-metric" data-metric-date="${d}" data-metric-key="hard" type="number" inputmode="decimal" step="0.01" min="0" value="${metrics.hard}" />
              <button class="row-metric-save" data-metric-save-date="${d}">Сохранить</button>
            </div>
          `;
          mobileItem.appendChild(noteBox);
        }

        mobileRowsEl.appendChild(mobileItem);
      }

      if (!dates.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" class="small">Пока нет сохраненных записей.</td>';
        rowsEl.appendChild(tr);
        mobileRowsEl.innerHTML = '<div class="mobile-empty">Пока нет сохраненных записей.</div>';
        monthTotalsEl.innerHTML = '<div class="summary-row"><span class="summary-key">Нет данных</span></div>';
        coworkerStatsEl.innerHTML = '<div class="summary-row"><span class="summary-key">Нет данных</span></div>';

        $('sumCash').textContent = fmt(0);
        $('sumPercent').textContent = fmt(0);
        $('sumRate').textContent = fmt(0);
        $('sumTotal').textContent = fmt(0);
        $('mobileSumCash').textContent = fmt(0);
        $('mobileSumPercent').textContent = fmt(0);
        $('mobileSumRate').textContent = fmt(0);
        $('mobileSumTotal').textContent = fmt(0);
        return;
      }

      $('sumCash').textContent = fmt(sumCash);
      $('sumPercent').textContent = fmt(sumPercent);
      $('sumRate').textContent = fmt(sumRate);
      $('sumTotal').textContent = fmt(sumTotal);
      $('mobileSumCash').textContent = fmt(sumCash);
      $('mobileSumPercent').textContent = fmt(sumPercent);
      $('mobileSumRate').textContent = fmt(sumRate);
      $('mobileSumTotal').textContent = fmt(sumTotal);

      const monthsDesc = Object.keys(monthTotals).sort((a, b) => b.localeCompare(a));
      monthTotalsEl.innerHTML = monthsDesc.map((m) => {
        const t = monthTotals[m];
        return `<div class="summary-row"><span class="summary-key">${monthLabel(`${m}-01`)}</span><span>Касса ${fmt(t.cash)} | % ${fmt(t.percent)} | Ставка ${fmt(t.rate)} | Итог ${fmt(t.total)}</span></div>`;
      }).join('');

      const coworkerRows = [];
      for (const m of monthsDesc) {
        const byCoworker = coworkerMonthStats[m];
        const people = Object.keys(byCoworker).sort((a, b) => a.localeCompare(b, 'ru'));
        const statsText = people.map((name) => `${escHtml(name)}: ${byCoworker[name]} дн.`).join(', ');
        coworkerRows.push(`<div class="summary-row"><span class="summary-key">${monthLabel(`${m}-01`)}</span><span>${statsText}</span></div>`);
      }
      coworkerStatsEl.innerHTML = coworkerRows.join('');
    }

    $('calcBtn').addEventListener('click', calc);
    $('saveBtn').addEventListener('click', saveDay);
    $('deleteBtn').addEventListener('click', deleteDay);
    $('clearBtn').addEventListener('click', clearSeason);
    function handleRowsClick(event, rootEl) {
      const toggleBtn = event.target.closest('[data-toggle-date]');
      if (toggleBtn) {
        const date = toggleBtn.dataset.toggleDate;
        expandedDate = expandedDate === date ? null : date;
        render();
        return;
      }

      const metricBtn = event.target.closest('[data-metric-save-date]');
      if (metricBtn) {
        const date = metricBtn.dataset.metricSaveDate;
        const inputs = rootEl.querySelectorAll(`[data-metric-date="${date}"]`);
        if (!inputs.length) return;

        const db = load();
        if (!db.entries[date]) return;
        db.entries[date].metrics = db.entries[date].metrics || {};
        for (const input of inputs) {
          const key = input.dataset.metricKey;
          db.entries[date].metrics[key] = num(input.value);
        }
        db.entries[date].updatedAt = new Date().toISOString();
        save(db);
        render();
        return;
      }

      const btn = event.target.closest('.row-delete');
      if (!btn) return;

      const date = btn.dataset.date;
      const db = load();
      if (!db.entries[date]) return;
      if (!confirm(`Удалить запись за ${date}?`)) return;

      delete db.entries[date];
      save(db);
      render();
    }
    rowsEl.addEventListener('click', (event) => handleRowsClick(event, rowsEl));
    mobileRowsEl.addEventListener('click', (event) => handleRowsClick(event, mobileRowsEl));
    dateEl.addEventListener('change', () => {
      autoDateEnabled = false;
      const db = load();
      coworkerEl.value = db.entries[dateEl.value]?.coworker || '';
      render();
    });

    calc();
    render();
    setInterval(() => {
      syncCurrentDate();
      render();
    }, 60000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((error) => {
          console.error('Service worker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
